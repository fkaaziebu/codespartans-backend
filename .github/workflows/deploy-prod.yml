name: Codespartans CI/CD (Production)

on:
  push:
    branches: ['main']

env:
  COMPOSE_PROJECT_NAME: codespartans-prod
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/codespartans-backend

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codespartans-test-db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force

      - name: Write test environment file
        run: |
          cat > .env.test.local << 'EOF'
          PORT=4002
          JWT_SECRET=test-jwt-secret-for-ci
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/codespartans-test-db?sslmode=disable
          GENPOP_EMAIL=genpop@codespartans.com
          EOF

      - name: Run unit tests
        run: npm run test -- --runInBand --forceExit

  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codespartans-test-db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force

      - name: Write test environment file
        run: |
          cat > .env.test.local << 'EOF'
          PORT=4002
          JWT_SECRET=test-jwt-secret-for-ci
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/codespartans-test-db?sslmode=disable
          DB_USERNAME=postgres
          DB_PASSWORD=postgres
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=codespartans-test-db
          DB_NAME_TEST=codespartans-test-db
          GENPOP_EMAIL=genpop@codespartans.com
          EMAIL_FROM=noreply@ci.test
          GMAIL_APP_PASSWORD=ci-fake-gmail-pass
          GMAIL_USER=ci@gmail.test
          EMAIL_HOST=smtp.gmail.com
          STUDENT_URL=http://localhost:3000
          PARENT_URL=http://localhost:3001
          PAYSTACK_SECRET_KEY=sk_test_fake
          ANTHROPIC_API_KEY=sk-ant-fake
          PAYMENT_RETENTION_YEARS=7
          ADMIN_EMAIL=admin@ci.test
          REDIS_URL=redis://localhost:6379
          ACCOUNT_DELETION_GRACE_DAYS=90
          EOF

      - name: Run E2E tests
        run: npm run test:e2e -- --runInBand --forceExit

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, test-e2e]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "========================================="
            echo "  Starting Codespartans Deployment (PROD)"
            echo "  Commit: ${{ github.sha }}"
            echo "  Time:   $(date)"
            echo "========================================="

            # ── 1. Ensure working directory exists ───────────────────────────
            mkdir -p ~/codespartans-prod && cd ~/codespartans-prod

            # ── 2. Install Docker only if missing ────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "[1/5] Installing Docker..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
              echo "Docker installed successfully."
            else
              echo "[1/5] Docker already installed: $(docker --version)"
              sudo systemctl start docker || true
            fi

            # ── 3. Install Docker Compose only if missing ─────────────────────
            if ! docker compose version &> /dev/null; then
              echo "[2/5] Installing Docker Compose..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL \
                https://github.com/docker/compose/releases/latest/download/docker-compose-linux-aarch64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              echo "Docker Compose installed: $(docker compose version)"
            else
              echo "[2/5] Docker Compose already installed: $(docker compose version)"
            fi

            # ── 4. Write configuration files ──────────────────────────────────
            echo "[3/5] Writing configuration files..."

            # Write .env file
            echo "${{ secrets.ENV_FILE }}" > .env

            # Download latest docker-compose.prod.yml from main branch
            curl -fsSL \
              https://raw.githubusercontent.com/fkaaziebu/codespartans-backend/main/docker-compose.prod.yml \
              -o docker-compose.yml

            echo "docker-compose.yml downloaded:"
            cat docker-compose.yml

            # ── 5. Pull latest images ──────────────────────────────────────────
            echo "[4/5] Pulling latest Docker images..."
            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} docker compose pull

            # ── 6. Deploy with zero volume disruption ─────────────────────────
            echo "[5/5] Deploying containers..."

            # Bring down only app containers — volumes are intentionally untouched
            # NOTE: Never use 'docker compose down -v' as it destroys postgres_data
            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} \
              docker compose down --remove-orphans --timeout 30

            # Bring everything back up
            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} \
              docker compose up -d

            # ── 7. Prune unused images to free disk space ──────────────────────
            echo "Pruning unused images..."
            docker image prune -f

            # ── 8. Health check ───────────────────────────────────────────────
            echo "Waiting for containers to be healthy..."
            sleep 10

            # Verify all containers are running
            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} docker compose ps

            # Confirm postgres volume still intact
            echo "Verifying postgres volume..."
            docker volume inspect ${{ env.COMPOSE_PROJECT_NAME }}_postgres_data \
              && echo "✅ postgres_data volume is intact" \
              || echo "⚠️  Warning: postgres_data volume not found"

            # Confirm disk usage is healthy
            echo "Disk usage:"
            df -h /

            echo "========================================="
            echo "  Deployment Complete ✅"
            echo "========================================="
