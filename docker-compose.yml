version: '3.9'

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codespartans-db
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codespartans-network

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - codespartans-network

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: 'password'
    ports:
      - '7700:7700'
    volumes:
      - ./meili_data:/meili_data
    networks:
      - codespartans-network

  codespartans-backend:
    image: fkaaziebu/codespartans-backend
    container_name: codespartans-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '4000:4000'
    networks:
      - codespartans-network

networks:
  codespartans-network:
    driver: bridge
